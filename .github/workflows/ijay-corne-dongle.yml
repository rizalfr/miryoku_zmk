name: 'a ijay corne dongle'
on: workflow_dispatch
jobs:
  peripherals:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["nice_nano_v2"]'
      shield: '["corne_left", "corne_right"]'
      alphas: '["QWERTY"]'
      nav: '["vi"]'
      custom_config: '["#define MIRYOKU_CLIPBOARD_FUN"]'
      kconfig: '["CONFIG_ZMK_POINTING=y\nCONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=15\nCONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=15\nCONFIG_ZMK_SLEEP=y\nCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n"]'
      branches: '["zmkfirmware/zmk/v0.3"]'
  dongle:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["nrfmicro_13"]'
      shield: '["corne_dongle"]'
      alphas: '["QWERTY"]'
      nav: '["vi"]'
      custom_config: '["#define MIRYOKU_CLIPBOARD_FUN"]'
      kconfig: '["CONFIG_ZMK_POINTING=y\nCONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=15\nCONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=15\nCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y\nCONFIG_ZMK_SLEEP=y"]'
      branches: '["zmkfirmware/zmk/v0.3"]'
